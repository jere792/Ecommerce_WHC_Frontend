<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%231e3a5f'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='Arial,sans-serif' font-weight='bold' font-size='24'%3EWHC%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHC - Tienda de Productos de Gasfiteria</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease-out;
      }
      #splash-screen.splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        color: #1e3a5f;
        animation: splashPulse 1.2s ease-in-out infinite;
      }
      .splash-sub {
        font-size: 0.9rem;
        color: #6b7280;
        margin-top: 0.5rem;
        letter-spacing: 0.05em;
      }
      .splash-dots {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.5rem;
      }
      .splash-dots span {
        width: 0.6rem;
        height: 0.6rem;
        border-radius: 50%;
        background: #1e3a5f;
        animation: splashDot 1.4s ease-in-out infinite both;
      }
      .splash-loading {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #9ca3af;
        letter-spacing: 0.1em;
        text-align: center;
      }
      .splash-dots span:nth-child(1) { animation-delay: 0s; }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      @keyframes splashDot {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-logo">WHC</div>
      <div class="splash-sub">Representaciones</div>
      <div class="splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="splash-loading">Cargando...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
